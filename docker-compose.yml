version: "3.9"

services:
  # --- PostgreSQL (Temporal persistence) ---
  temporal-db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal
      POSTGRES_DB: temporal
    volumes:
      - temporal-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal"]
      interval: 5s
      timeout: 3s
      retries: 10

  # --- Temporal Server ---
  temporal:
    image: temporalio/auto-setup:1.24.2
    ports:
      - "7233:7233"
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=temporal
      - POSTGRES_SEEDS=temporal-db
      - DYNAMIC_CONFIG_FILE_PATH=config/dynamicconfig/development-sql.yaml
    depends_on:
      temporal-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "temporal", "workflow", "list", "--address", "temporal:7233"]
      interval: 10s
      timeout: 5s
      retries: 20

  temporal-ui:
    image: temporalio/ui:2.30.3
    ports:
      - "8080:8080"
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
    depends_on:
      temporal:
        condition: service_healthy

  # --- FastAPI Backend ---
  api:
    build:
      context: .
      dockerfile: Dockerfile
    command: >
      uvicorn src.app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - DATABASE_URL=sqlite:///./data/assistants.db
    volumes:
      - .:/app
      - app-data:/app/data
    depends_on:
      temporal:
        condition: service_healthy

  # --- Temporal Worker ---
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: python -m src.workflows.worker
    env_file: .env
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - DATABASE_URL=sqlite:///./data/assistants.db
    volumes:
      - .:/app
      - app-data:/app/data
    depends_on:
      temporal:
        condition: service_healthy

  # --- Streamlit UI ---
  streamlit:
    build:
      context: .
      dockerfile: Dockerfile
    command: >
      streamlit run src/ui/streamlit_app.py
      --server.port=8501
      --server.address=0.0.0.0
      --theme.base=light
    ports:
      - "8501:8501"
    env_file: .env
    environment:
      - API_BASE_URL=http://api:8000
    volumes:
      - .:/app
    depends_on:
      - api

volumes:
  app-data:
  temporal-db-data:
